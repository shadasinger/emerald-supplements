<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald | Prescription Link Generator</title>
<link rel="icon" type="image/avif" href="assets/favicon.avif">
<style>
  @font-face {
    font-family: 'Satoshi';
    src: url('fonts/Satoshi-Variable.woff2') format('woff2');
    font-weight: 300 900;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #EFF2F4;
    --teal: #66DDD8;
    --ink: rgb(14, 35, 32);
    --grey: #7A8580;
    --card-border: #E3E8EA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Satoshi', sans-serif;
    background-color: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Navbar ---------- */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background-color: rgba(255, 255, 255, 0.6);
    width: 100%;
  }
  .navbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .navbar-logo img { height: 28px; display: block; }

  /* ---------- Layout ---------- */
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px 160px;
  }

  h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .subheading { font-size: 15px; color: var(--grey); margin-bottom: 28px; }

  /* ---------- Supplement pills ---------- */
  .pills { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; }
  .pill {
    font-family: 'Satoshi', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    background: rgba(14, 35, 32, 0.05);
    border: none;
    border-radius: 100px;
    padding: 10px 18px;
    cursor: pointer;
  }
  .pill.active { background: var(--teal); font-weight: 700; }

  /* ---------- Preview cards ---------- */
  .preview { display: flex; flex-direction: column; gap: 10px; }
  .preview-empty { color: var(--grey); font-size: 15px; }
  .row {
    background: #fff;
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .row img { height: 48px; width: 48px; object-fit: contain; }
  .row .name { font-size: 15px; font-weight: 700; flex: 1; }
  .row .price { font-size: 15px; font-weight: 500; color: var(--grey); }

  /* ---------- Link bar ---------- */
  .link-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background-color: rgba(255, 255, 255, 0.85);
    border-top: 1px solid var(--card-border);
  }
  .link-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 24px;
  }
  .link-wrap { position: relative; }
  .link-field {
    width: 100%;
    font-family: 'Satoshi', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--card-border);
    border-radius: 100px;
    padding: 16px 160px 16px 20px;
    outline: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-field::placeholder { font-weight: 400; }
  .copy-btn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Satoshi', sans-serif;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 100px;
    padding: 11px 20px;
    cursor: pointer;
    white-space: nowrap;
  }
  .copy-btn:disabled { opacity: 0.4; cursor: default; }
  .copy-btn svg { display: block; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="navbar-logo"><img src="assets/emerald-logo.png" alt="Emerald"></span>
  </div>
</nav>

<main class="page">
  <h1>Supplement Prescription Link Generator</h1>
  <p class="subheading">For medical team use</p>

  <div class="pills" id="pills"></div>
  <div class="preview" id="preview"></div>
</main>

<div class="link-bar">
  <div class="link-inner">
    <div class="link-wrap">
    <input class="link-field" id="link" type="text" readonly placeholder="Select supplements to generate a link">
    <button class="copy-btn" id="copy" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copy-label">Copy link</span>
    </button>
    </div>
  </div>
</div>

<script>
// Customer-facing page lives in the same folder as this file.
const BASE_URL = location.origin.startsWith('http')
  ? location.href.replace(/[^/]*$/, '')
  : 'https://shadasinger.github.io/emerald-supplements/';

const SUPPLEMENTS = [
  { slug: 'vitamin-d3',          label: 'Vit D Tablets',   name: 'BioCare Vitamin D',                 price: 14.89, img: 'images/vitamin-d3-tablet.jpg' },
  { slug: 'vitamin-d3-spray',    label: 'Vit D Spray',     name: 'BioCare Vitamin D Mouth Spray',     price: 10.85, img: 'images/vitamin-d3-spray.jpg' },
  { slug: 'omega-3',             label: 'Omega-3',         name: 'BioCare Omega-3',                   price: 32.65, img: 'images/omega-3.jpg' },
  { slug: 'iron-complex',        label: 'Iron Complex',    name: 'BioCare Iron Complex',              price: 21.19, img: 'images/iron-complex.jpg' },
  { slug: 'vitamin-c',           label: 'Vitamin C',       name: 'BioCare Vitamin C',                 price: 12.49, img: 'images/vitamin-c.jpg' },
  { slug: 'vitamin-b12',         label: 'Vitamin B12',     name: 'BioCare Vitamin B12',               price: 14.89, img: 'images/vitamin-b12-500mg.jpg' },
  { slug: 'multivitamins',       label: 'Multivitamins',   name: 'BioCare Multivitamins & Minerals',  price: 15.29, img: 'images/multivitamins.jpg' },
  { slug: 'methylfolate',        label: 'Methylfolate',    name: 'BioCare Methylfolate (Folic Acid)', price: 25.39, img: 'images/methylfolate.jpg' },
  { slug: 'zinc',                label: 'Zinc',            name: 'BioCare Zinc',                      price: 8.05,  img: 'images/zinc.jpg' },
  { slug: 'magnesium',           label: 'Magnesium',       name: 'BioCare Magnesium Glycinate',       price: 16.99, img: 'images/magnesium-glycinate.jpeg' },
  { slug: 'selenium',            label: 'Selenium',        name: 'BioCare Selenium',                  price: 16.15, img: 'images/selenium.jpg' },
  { slug: 'iron-high-dose',      label: 'High-dose Iron',  name: 'High-dose Iron (Ferrous Sulphate)', price: 6.99,  img: 'images/highdose-iron.jpeg' },
  { slug: 'b12-high-dose',       label: 'High-dose B12',   name: 'High-dose Vitamin B12',             price: 10.99, img: 'images/b12-1000mg.jpeg' },
  { slug: 'vitamin-d-high-dose', label: 'High-dose Vit D', name: 'Vitamin D High-dose',               price: 14.99, img: 'images/highdose-vitamin-d3.png' },
];

const selected = new Set();

const pillsEl = document.getElementById('pills');
const previewEl = document.getElementById('preview');
const linkEl = document.getElementById('link');
const copyBtn = document.getElementById('copy');
const copyLabel = document.getElementById('copy-label');

pillsEl.innerHTML = SUPPLEMENTS.map(s =>
  `<button class="pill" data-slug="${s.slug}">${s.label}</button>`).join('');

function render() {
  document.querySelectorAll('.pill').forEach(p =>
    p.classList.toggle('active', selected.has(p.dataset.slug)));

  const chosen = SUPPLEMENTS.filter(s => selected.has(s.slug));

  previewEl.innerHTML = chosen.length
    ? chosen.map(s => `
        <div class="row">
          <img src="${s.img}" alt="${s.name}">
          <span class="name">${s.name}</span>
          <span class="price">£${s.price.toFixed(2)}</span>
        </div>`).join('')
    : '<p class="preview-empty">Select supplements above to preview the prescription.</p>';

  linkEl.value = chosen.length
    ? BASE_URL + '?products=' + chosen.map(s => s.slug).join('+')
    : '';
  copyBtn.disabled = !chosen.length;
}

pillsEl.addEventListener('click', e => {
  const slug = e.target.dataset?.slug;
  if (!slug) return;
  selected.has(slug) ? selected.delete(slug) : selected.add(slug);
  render();
});

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(linkEl.value);
  } catch {
    linkEl.select();
    document.execCommand('copy');
  }
  copyLabel.textContent = 'Copied ✓';
  setTimeout(() => { copyLabel.textContent = 'Copy link'; }, 2000);
});

render();
</script>
</body>
</html>
